# EstWarden Dagu base configuration.
# Applied to ALL DAGs. Location: ${DAGU_HOME}/base.yaml

# Load all credentials from .env — exported to step subprocesses
dotenv: /var/lib/dagu/dags/.env

# Secrets — auto-masked in all logs and outputs
secrets:
  - name: ESTWARDEN_API_KEY
    provider: env
    key: ESTWARDEN_API_KEY
  - name: OPENROUTER_API_KEY
    provider: env
    key: OPENROUTER_API_KEY
  - name: PIPELINE_BOT_TOKEN
    provider: env
    key: PIPELINE_BOT_TOKEN
  - name: BURNER_SESSION
    provider: env
    key: BURNER_SESSION
  - name: ACLED_PASSWORD
    provider: env
    key: ACLED_PASSWORD

# Env — pass container env vars to step subprocesses
env:
  - TZ: Europe/Tallinn
  - PYTHONPATH: /dags/scripts
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
  - DATABASE_URL: "${DATABASE_URL}"
  - PIPELINE_ADMIN_CHAT: "${PIPELINE_ADMIN_CHAT}"
  - GCP_PROJECT: "${GCP_PROJECT}"
  - GCP_SERVICE_ACCOUNT: "${GCP_SERVICE_ACCOUNT}"
  - GOOGLE_EE_KEY: "${GOOGLE_EE_KEY}"
  - GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS}"
  - LLM_API_KEY: "${LLM_API_KEY}"
  - LLM_API_URL: "${LLM_API_URL}"
  - LLM_MODEL: "${LLM_MODEL}"
  - OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
  - FIRMS_MAP_KEY: "${FIRMS_MAP_KEY}"
  - ACLED_USERNAME: "${ACLED_USERNAME}"
  - ACLED_PASSWORD: "${ACLED_PASSWORD}"
  - PERPLEXITY_API_KEY: "${PERPLEXITY_API_KEY}"
  - BURNER_API_ID: "${BURNER_API_ID}"
  - BURNER_API_HASH: "${BURNER_API_HASH}"
  - BURNER_SESSION: "${BURNER_SESSION}"
  - TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
  - TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
  - TELEGRAM_ADMIN_ID: "${TELEGRAM_ADMIN_ID}"
  - GCS_SATELLITE_BUCKET: "${GCS_SATELLITE_BUCKET}"
  - REDIS_URL: "${REDIS_URL}"
  - TAVILY_API_KEY: "${TAVILY_API_KEY}"

# Default shell (bash if available, fallback to sh)
shell: /bin/bash

# Default retry for all steps
defaults:
  retry_policy:
    limit: 1
    interval_sec: 60

# Telegram alert on ANY DAG failure via dedicated pipeline bot
handler_on:
  failure:
    command: 'curl -sf -X POST "https://api.telegram.org/bot${PIPELINE_BOT_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\":\"${PIPELINE_ADMIN_CHAT}\",\"text\":\"❌ ${DAG_NAME} failed\",\"parse_mode\":\"HTML\"}" 2>> /var/lib/dagu/data/alert_errors.log || echo "$(date) alert failed for ${DAG_NAME}" >> /var/lib/dagu/data/alert_errors.log'

# History
hist_retention_days: 30
max_output_size: 1048576
