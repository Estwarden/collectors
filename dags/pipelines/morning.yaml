name: morning-pipeline
description: Daily intelligence pipeline — collect → translate → classify → enrich
schedule: "0 8 * * *"
type: graph

steps:
  - id: collect_rss
    type: dag
    call: collect/rss

  - id: collect_energy
    type: dag
    call: collect/energy

  - id: collect_deepstate
    type: dag
    call: collect/deepstate

  - id: translate_extract
    type: dag
    call: process/translate-and-extract
    depends: [collect_rss]

  - id: classify
    type: dag
    call: process/classify
    depends: [translate_extract]

  - id: compute_cti
    type: dag
    call: process/threat-index
    depends: [collect_rss, collect_energy, collect_deepstate, classify]

  - id: healthcheck
    type: dag
    call: maintain/healthcheck
    depends: [collect_rss, collect_energy, collect_deepstate]

  - id: generate_report
    type: dag
    call: process/daily-report
    depends: [compute_cti, healthcheck]

  - id: log_complete
    command: echo "Morning pipeline complete at $(date)"
    depends: [generate_report]
    retry_policy:
      limit: 2
      interval_sec: 60
