name: morning-pipeline
description: Daily intelligence pipeline — collect → translate → classify → enrich
schedule: "0 8 * * *"
type: graph

steps:
  - id: collect_rss
    type: dag
    call: collect/rss

  - id: collect_energy
    type: dag
    call: collect/energy

  - id: collect_deepstate
    type: dag
    call: collect/deepstate

  - id: translate_extract
    type: dag
    call: process/translate-and-extract
    depends: [collect_rss]

  - id: classify
    type: dag
    call: process/classify
    depends: [translate_extract]

  - id: healthcheck
    type: dag
    call: maintain/healthcheck
    depends: [collect_rss, collect_energy, collect_deepstate]

  - id: log_complete
    command: echo "Morning pipeline complete at $(date)"
    depends: [classify, healthcheck]
