name: dedup-signals
description: Remove duplicate signals by content_hash
schedule: "30 4 * * *"
queue: maintenance


steps:
  - id: dedup
    type: http
    command: "POST ${ESTWARDEN_API_URL}/api/v1/maintenance/dedup"
    config:
      headers:
        X-Pipeline-Key: "${ESTWARDEN_API_KEY}"
      timeout: 120
    retry_policy:
      limit: 2
      interval_sec: 60
