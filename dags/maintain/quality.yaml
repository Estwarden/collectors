name: data-quality
description: Fix orphaned tags, self-loops, duplicates, NEUTRAL tags
schedule: "30 5 * * *"
queue: maintenance


steps:
  - id: quality_audit
    type: http
    command: "POST ${ESTWARDEN_API_URL}/api/v1/maintenance/quality"
    config:
      headers:
        X-Pipeline-Key: "${ESTWARDEN_API_KEY}"
      timeout: 120
    retry_policy:
      limit: 2
      interval_sec: 60
