  into active campaigns, regardless of relevance, temporal proximity, or coherence.
  Campaign signals are now linked at detection time only (in campaigns.yaml).
  See commit history for rationale.

# Schedule removed — DAG is disabled
# Was: schedule: "0 */4 * * *"

steps:
