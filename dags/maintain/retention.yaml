name: data-retention
description: Delete signals older than 180 days (except OSINT/satellite)
schedule: "0 4 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - id: retention-cleanup
    type: http
    command: "POST ${ESTWARDEN_API_URL}/api/v1/maintenance/retention"
    config:
      headers:
        X-Pipeline-Key: "${ESTWARDEN_API_KEY}"
      timeout: 120
