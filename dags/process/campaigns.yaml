name: detect-campaigns
description: |
  Trigger server-side campaign detection via Data API.
  All analytical SQL runs in the ingest service — DAG just calls the endpoint.
  
  Three detection methods (server-side):
  1. AMPLIFICATION: RU state/proxy narrative picked up by non-trusted channels
  2. ACTOR BLITZ: Single actor publishing unusually high volume (z>3)
  3. NARRATIVE SPIKE: Specific taxonomy narrative spiking across 3+ actors (z>3)

schedule: "50 */6 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - id: detect
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, os, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import detect_campaigns
      result = detect_campaigns()
      
      resolved = result.get('resolved', 0)
      created = result.get('created', 0)
      campaigns = result.get('campaigns', [])

      if resolved:
          print(f'Auto-resolved {resolved} stale campaigns')

      if campaigns:
          for c in campaigns:
              print(f'  {c[\"method\"]:20s} #{c[\"id\"]}: {c[\"name\"]}')
          print(f'\nTotal: {created} campaigns created')
      else:
          print('No campaigns detected')
      "
    retry_policy:
      limit: 2
      interval_sec: 60
