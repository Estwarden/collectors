name: compute-threat-index
description: Compute per-region Composite Threat Index from signals
schedule: "15 */3 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
  - REGIONS_CONFIG: "/dags/config/regions.yaml"

steps:
  - id: compute
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, os, json
      from datetime import datetime, timezone
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      today = datetime.now(timezone.utc).strftime('%Y-%m-%d')

      # Source weights (research-validated, March 2026)
      WEIGHTS = {
          'gpsjam': 20, 'adsb': 15, 'acled': 15, 'firms': 15,
          'ais': 10, 'telegram': 10, 'rss': 5, 'gdelt': 5, 'ioda': 5,
      }
      TOTAL_W = sum(WEIGHTS.values())
      THRESHOLDS = {'yellow': 15.2, 'orange': 59.7, 'red': 92.8}

      # Per-region CTI — each brand group gets its own score
      REGIONS = {
          'baltic':  'global,baltic,estonia,latvia,lithuania,kaliningrad,pskov,stpetersburg,belarus_north',
          'finland': 'global,finland,stpetersburg,murmansk',
          'poland':  'global,poland,kaliningrad,belarus_north',
      }

      for region, filter_str in REGIONS.items():
          baselines = client.query_baselines(region=filter_str)
          score = 0.0
          for b in baselines:
              st = b.get('source_type', '')
              w = WEIGHTS.get(st, 0)
              if w == 0: continue
              mean = b.get('mean_7d', 0)
              stddev = max(b.get('stddev_7d', 1), 1)
              current = b.get('current_24h', 0)
              z = max((current - mean) / stddev, 0)
              score += min(z * 10, 100) * (w / TOTAL_W)
          score = min(score, 100)

          if score >= THRESHOLDS['red']: level = 'RED'
          elif score >= THRESHOLDS['orange']: level = 'ORANGE'
          elif score >= THRESHOLDS['yellow']: level = 'YELLOW'
          else: level = 'GREEN'

          client.ingest_threat_index(today, score, level, region=region)
          print(f'{region}: {score:.1f}/100 ({level})')
      "
    retry_policy:
      limit: 1
      interval_sec: 300
