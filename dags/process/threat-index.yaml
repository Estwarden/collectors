name: compute-threat-index
description: Compute per-region Composite Threat Index from signals + campaigns + narratives
schedule: "15 */3 * * *"
steps:
  - id: compute
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/compute_threat_index.py
    retry_policy:
      limit: 1
      interval_sec: 300
