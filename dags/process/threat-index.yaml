name: compute-threat-index
description: Compute daily Composite Threat Index from signals and indicators
schedule: "15 */3 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - id: compute
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, os, json
      from datetime import datetime, timezone
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()

      baselines = client.query_baselines()
      today = datetime.now(timezone.utc).strftime('%Y-%m-%d')

      # ── Research-calibrated CTI (March 2026 optimization, 85K trials) ──
      # See: github.com/Estwarden/research/methodology/composite-threat-index.md

      weights = {'gpsjam': 20, 'adsb': 15, 'acled': 15, 'firms': 15,
                 'ais': 10, 'telegram': 10, 'rss': 5, 'gdelt': 5, 'ioda': 5}
      total_weight = sum(weights.values())

      # Research finding: trend matters more than smoothing
      TREND_MULT = 0.927   # trust the direction
      MOMENTUM = 0.034     # minimal smoothing — react fast

      # Compute raw score from z-scores
      raw_score = 0
      for b in baselines:
          st = b.get('source_type', '')
          w = weights.get(st, 0)
          if w == 0: continue
          mean = b.get('mean_7d', 0)
          stddev = max(b.get('stddev_7d', 1), 1)
          current = b.get('current_24h', 0)
          z = max((current - mean) / stddev, 0)
          contrib = min(z * 10, 100) * (w / total_weight)
          raw_score += contrib

      score = min(raw_score, 100)

      # Research-calibrated thresholds (optimized for early YELLOW detection)
      if score >= 92.8:
          level = 'RED'
      elif score >= 59.7:
          level = 'ORANGE'
      elif score >= 15.2:
          level = 'YELLOW'
      else:
          level = 'GREEN'

      result = client.ingest_threat_index(today, score, level)
      print(f'Threat Index: {score:.1f}/100 ({level}) for {today}')
      "
    retry_policy:
      limit: 1
      interval_sec: 300
