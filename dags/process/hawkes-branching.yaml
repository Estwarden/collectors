name: hawkes-branching
description: Compute Hawkes branching ratio for event clusters (coordination metric)
schedule: "45 */3 * * *"

env:
  - DATABASE_URL: "${DATABASE_URL}"

steps:
  - id: compute
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/hawkes_branching.py
    retry_policy:
      limit: 1
      interval_sec: 300
