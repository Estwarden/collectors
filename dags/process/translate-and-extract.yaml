name: translate-and-extract
description: Translate Russian/Estonian signals to English, extract named entities via Google Cloud NLP
schedule: "15 */3 * * *"
steps:
  - id: translate_extract
    shell: /bin/bash
    script: |
      pip install cryptography -q 2>/dev/null
      cd /dags
      python3 processors/translate_and_extract.py
    retry_policy:
      limit: 1
      interval_sec: 300
