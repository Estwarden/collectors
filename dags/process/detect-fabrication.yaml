name: detect-fabrication
description: |
  Gemini-based fabrication detection for multi-category event clusters.
  For each cluster spanning 2+ source categories, compares root signal 
  to downstream signals to detect added claims, certainty escalation,
  and emotional amplification.
  Also records narrative origins (who posted first per cluster).
  Cost: ~$0.01/day (1 Gemini call per multi-cat cluster).
schedule: "45 */4 * * *"

env:
  - DATABASE_URL: "${DATABASE_URL}"
  - GOOGLE_API_KEY: "${GOOGLE_API_KEY}"

steps:
  - id: detect
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/detect_fabrication.py --days 3 --max-clusters 30 --min-score 4
    retry_policy:
      limit: 1
      interval_sec: 300
