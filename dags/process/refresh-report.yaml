name: refresh-daily-report
description: Regenerate today's daily report with latest data (runs every 2 hours)
schedule: "50 */2 * * *"

type: graph

steps:
  - id: regenerate
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/report_generator.py --date $(date -u +%Y-%m-%d)
    retry_policy:
      limit: 1
      interval_sec: 60

  - id: flush_cache
    shell: /bin/bash
    script: |
      # Clear cached indicator + briefing pages so dashboard shows fresh data
      for pattern in 'topic:*' 'briefing:*' 'dashboard:*'; do
        redis-cli -h redis KEYS "$pattern" 2>/dev/null | xargs -r redis-cli -h redis DEL 2>/dev/null
      done
      echo "Cache cleared"
    depends:
      - regenerate
