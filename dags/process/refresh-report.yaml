name: refresh-daily-report
description: Regenerate today's daily report with latest data (runs every 2 hours)
schedule: "30 */2 * * *"

steps:
  - id: regenerate
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/report_generator.py --date $(date -u +%Y-%m-%d)
    retry_policy:
      limit: 1
      interval_sec: 60

  - id: flush_cache
    shell: /bin/bash
    script: |
      # Clear cached pages so dashboard shows fresh data
      redis-cli -h redis DEL dashboard:page:cache intelligence:page:cache 2>/dev/null || true
