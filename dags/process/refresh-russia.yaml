name: refresh-russia-page
description: Update /russia page numbers from live loss data API
schedule: "30 */2 * * *"
env:
  - DATABASE_URL: "${DATABASE_URL}"
steps:
  - id: regenerate
    shell: /bin/bash
    script: |
      cd /dags
      HTML=$(python3 processors/refresh_russia_page.py 2>/dev/null)
      if [ -z "$HTML" ]; then
        echo "ERROR: empty output"
        exit 1
      fi
      printf '%s' "$HTML" | redis-cli -h redis -x SET go:page:/russia > /dev/null
      for key in $(redis-cli -h redis --scan --pattern 'go:page:/russia:*'); do
        redis-cli -h redis DEL "$key" > /dev/null
      done
      echo "Russia page updated: $(printf '%s' "$HTML" | wc -c) bytes"
