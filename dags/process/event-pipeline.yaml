name: event-detection-pipeline
description: |
  Full event-based campaign detection pipeline:
  1. Embed: relevance gate → Google embedding → pgvector
  2. Cluster: group signals about the same event (cosine > 0.82)
  3. Framing: LLM compares state vs trusted media framing per cluster
  4. Assemble: hostile framings → campaigns

  Runs every 4 hours. Each stage is idempotent — safe to re-run.
  Cost: ~$0.01/day (embeddings + 1-2 LLM calls for framing analysis).

schedule: "30 */4 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - id: outrage-chains
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/detect/outrage-chains', {})
      print('Outrage chains: %d detected from %d Baltic state signals → %d campaigns' % (
          r.get('chains_detected', 0), r.get('baltic_state_signals', 0), r.get('campaigns_created', 0)))
      "

  - id: embed
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/process/embed', {})
      print('Embed: %d embedded, %d rejected, %d passed gate' % (
          r.get('embedded', 0), r.get('rejected', 0), r.get('passed', 0)))
      "

  - id: cluster
    depends:
      - embed
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/process/cluster', {})
      print('Cluster: %d signals → %d new clusters' % (
          r.get('signals', 0), r.get('new_clusters', 0)))
      "

  - id: framing
    depends:
      - cluster
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/process/framing', {})
      print('Framing: %d analyzed, %d hostile' % (
          r.get('analyzed', 0), r.get('hostile', 0)))
      "

  - id: assemble
    depends:
      - framing
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/process/assemble-campaigns', {})
      print('Assemble: %d hostile events → %d campaigns' % (
          r.get('hostile_events', 0), r.get('campaigns', 0)))
      "

  - id: injection-cascades
    depends:
      - cluster
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/detect/injection-cascades', {})
      print('Injection cascades: %d candidates → %d injections, %d watch' % (
          r.get('candidates', 0), r.get('injections', 0), r.get('watch', 0)))
      "

  - id: narrative-campaigns
    depends:
      - assemble
      - outrage-chains
      - injection-cascades
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import EstWardenClient
      client = EstWardenClient()
      r = client._post('/api/v1/process/narrative-campaigns', {})
      print('Narrative campaigns: %d events embedded, %d new campaigns, %d joined, %d named' % (
          r.get('events_embedded', 0), r.get('new_campaigns', 0),
          r.get('joined_existing', 0), r.get('campaigns_named', 0)))
      "
