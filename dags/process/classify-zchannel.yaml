name: classify-zchannel
description: Classify Z-channel signals with hostile-source-aware prompt
schedule: "5 */3 * * *"
queue: llm


steps:
  - id: classify
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/classify_zchannel.py 500
    retry_policy:
      limit: 1
      interval_sec: 60
