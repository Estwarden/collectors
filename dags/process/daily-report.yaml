name: generate-daily-report
description: Generate minimal fail-closed daily report from current collector state + CTI
schedule: "25 */3 * * *"


steps:
  - id: generate_report
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/report_generator.py
    retry_policy:
      limit: 1
      interval_sec: 300
