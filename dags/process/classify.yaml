name: classify-signals
description: LLM narrative classification (N1-N5) for untagged signals
schedule: "*/10 * * * *"
queue: llm


steps:
  - id: classify
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/classifier.py
    retry_policy:
      limit: 1
      interval_sec: 120
