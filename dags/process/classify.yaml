name: classify-signals
description: LLM narrative classification (N1-N5) for untagged signals
schedule: "*/10 * * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
  - OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
  - LLM_MODEL: "${LLM_MODEL}"

steps:
  - name: classify
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/processors/classifier.py
    retry:
      limit: 1
      interval: 120
