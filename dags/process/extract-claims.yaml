name: extract-narrative-claims
description: LLM-based extraction of testable predictions and assertions from media posts
schedule: "0 6 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
  - DATABASE_URL: "${DATABASE_URL}"
  - OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
  - LLM_MODEL: "${LLM_MODEL}"
  - GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS}"

steps:
  - name: extract
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/extract_claims.py --hours 12 --limit 100
    retry:
      limit: 1
      interval: 300
