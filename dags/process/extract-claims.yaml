name: extract-narrative-claims
description: LLM-based extraction of testable predictions and assertions from media posts
schedule: "0 6 * * *"
steps:
  - id: extract
    shell: /bin/bash
    script: |
      cd /dags
      python3 processors/extract_claims.py --hours 12 --limit 100
    retry_policy:
      limit: 1
      interval_sec: 300
