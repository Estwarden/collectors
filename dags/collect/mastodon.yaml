name: collect-mastodon
description: Fediverse defense and OSINT community posts
schedule: "0 */3 * * *"
queue: collectors
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/mastodon_collector.py
    retry_policy:
      limit: 1
      interval_sec: 300
