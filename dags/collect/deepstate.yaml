name: collect-deepstate
description: Collect frontline data from deepstate.live
schedule: "5 2,8,14,20 * * *"


steps:
  - id: fetch_frontline
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/deepstate_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
