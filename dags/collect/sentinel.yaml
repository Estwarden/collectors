name: collect-sentinel
description: Sentinel-1 SAR acquisitions over Baltic Sea
schedule: "0 8,20 * * *"
env:
  - ESTWARDEN_API_URL: ""
  - ESTWARDEN_API_KEY: ""
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/sentinel_collector.py
    retry_policy:
      limit: 2
      interval_sec: 600
