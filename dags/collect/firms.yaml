name: collect-firms
description: Collect NASA FIRMS thermal anomalies
schedule: "0 */6 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
  - FIRMS_MAP_KEY: "${FIRMS_MAP_KEY}"

steps:
  - name: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/firms_collector.py
    retry:
      limit: 2
      interval: 300
