name: collect-space-weather
description: Collect solar/geomagnetic data from NOAA Space Weather
schedule: "0 */6 * * *"


steps:
  - id: fetch_noaa
    shell: /bin/bash
    script: |
      cd /dags
      python3 -c "
      import sys, json, os, urllib.request
      from datetime import datetime, timezone
      sys.path.insert(0, 'scripts/lib')
      from estwarden_client import ingest_signals
      # Planetary K-index (geomagnetic storm indicator)
      url = 'https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json'
      with urllib.request.urlopen(url, timeout=15) as r:
          rows = json.loads(r.read())

      # NOAA returns list of dicts: {time_tag, Kp, a_running, station_count}
      signals = []
      for row in rows[-8:]:
          if not isinstance(row, dict) or 'time_tag' not in row:
              continue
          ts = row['time_tag']
          kp = float(row['Kp'])
          severity = 'LOW' if kp < 4 else 'MODERATE' if kp < 6 else 'HIGH' if kp < 8 else 'EXTREME'
          signals.append({
              'source_type': 'space_weather',
              'source_id': f'noaa:kp:{ts}',
              'title': f'Planetary Kp index: {kp:.1f} ({severity})',
              'content': f'NOAA Planetary K-index at {ts}: {kp:.1f}. Storm level: {severity}',
              'published_at': ts.replace(' ', 'T') + 'Z' if ' ' in ts else ts,
              'severity': severity,
              'metric_value': kp,
              'metadata': {'source': 'noaa_swpc', 'index': 'kp'},
          })

      if signals:
          result = ingest_signals(signals)
          print(f'Space weather: {result[\"inserted\"]} new')
      "
    retry_policy:
      limit: 2
      interval_sec: 300
