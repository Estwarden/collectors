name: collect-acled
description: Collect ACLED European conflict events
schedule: "0 */12 * * *"


steps:
  - id: collect
    shell: /bin/bash
    script: |
      set -a
      [ -f /var/lib/dagu/dags/.env ] && . /var/lib/dagu/dags/.env
      set +a
      cd /dags
      python3 scripts/collectors/acled_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
