name: collect-embassy
description: Collect travel advisories from US, UK, FI for Baltic states
schedule: "0 6 * * *"
env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/embassy_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
