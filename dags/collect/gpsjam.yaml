name: collect-gpsjam
description: Collect GPS jamming data from gpsjam.org
schedule: "0 */12 * * *"
queue: collectors


steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/gpsjam_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
