# Satellite imagery collection via Google Earth Engine
# Sentinel-2 overpass ~07:00-09:00 UTC for Baltic/RU region
# Data available ~13:00-17:00 UTC → run at 18:00 UTC daily
#
# 38 sites, ~7s each in batches of 5 = ~5 min total
# Most days: no new scene for a given site (5-day revisit)

schedule: "0 18 * * *"


steps:
  - name: collect-satellite
    command: python3 -u /dags/scripts/collectors/satellite_collector.py
    output: RESULT
