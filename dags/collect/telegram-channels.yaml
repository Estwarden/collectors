name: collect-telegram-channels
description: Scrape public Telegram channel previews for narrative monitoring
schedule: "30 */4 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - name: scrape-channels
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/telegram_collector.py \
        --config config/watchlists/telegram_channels.yaml
    retry:
      limit: 2
      interval: 300
