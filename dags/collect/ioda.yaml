name: collect-ioda
description: Monitor Baltic internet connectivity (IODA)
schedule: "0 */4 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - name: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/ioda_collector.py
    retry:
      limit: 2
      interval: 300
