name: collect-stats-ee
description: Collect Statistics Estonia economic indicators
schedule: "0 9 * * 1"
env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/stats_ee_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
