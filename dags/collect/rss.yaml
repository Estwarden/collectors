name: collect-rss
description: Collect signals from 54+ RSS/Atom feeds
schedule: "0 */2 * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - name: fetch-all-feeds
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/rss_collector.py --feeds config/feeds.yaml
    retry:
      limit: 2
      interval: 300
