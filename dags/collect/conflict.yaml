name: collect-conflict
description: Conflict events from UCDP and Crisis Group (ACLED replacement)
schedule: "0 7,19 * * *"
queue: collectors
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/conflict_collector.py
    retry_policy:
      limit: 2
      interval_sec: 600
