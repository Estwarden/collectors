name: collect-milwatch
description: Ukrainian USF Grouping killboard (sbs-group.army) — unit-level combat stats
schedule: "0 */6 * * *"
steps:
  - name: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/milwatch_collector.py
    retry:
      limit: 2
      interval: 300
