name: collect-energy
description: Collect electricity prices for all monitored countries (EE, FI, LV, LT, PL)
schedule: "0 * * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - id: fetch_prices
    command: python3 /dags/scripts/collectors/energy_collector.py
    retry_policy:
      limit: 2
      interval_sec: 120
