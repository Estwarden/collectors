name: collect-adsb
description: Collect ADS-B aircraft positions (Baltic region)
schedule: "*/15 * * * *"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - name: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/adsb_collector.py
    retry:
      limit: 2
      interval: 300
