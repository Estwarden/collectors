name: collect-adsb
description: Collect ADS-B aircraft positions (Baltic region)
schedule: "*/15 * * * *"
queue: collectors


steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/adsb_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
