name: collect-nato-rss
description: NATO and defense think tank RSS feeds
schedule: "30 */4 * * *"
env:
  - ESTWARDEN_API_URL: ""
  - ESTWARDEN_API_KEY: ""
steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags && python3 scripts/collectors/nato_rss_collector.py
    retry_policy:
      limit: 2
      interval_sec: 300
