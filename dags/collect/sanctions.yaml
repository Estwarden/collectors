name: collect-sanctions
description: Sync OpenSanctions dataset
schedule: "0 3 * * 1"

env:
  - ESTWARDEN_API_URL: "${ESTWARDEN_API_URL}"
  - ESTWARDEN_API_KEY: "${ESTWARDEN_API_KEY}"

steps:
  - name: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/sanctions_collector.py
    retry:
      limit: 2
      interval: 300
