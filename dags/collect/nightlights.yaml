name: collect-nightlights
description: Collect VIIRS nighttime lights anomalies at military sites
schedule: "0 6 * * *"


steps:
  - id: collect
    shell: /bin/bash
    script: |
      cd /dags
      python3 scripts/collectors/nightlights_collector.py
    retry_policy:
      limit: 2
      interval_sec: 600
